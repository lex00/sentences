<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sentences · name that part</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; min-height: 100%; }
      body {
        display: grid; place-items: start center; background: #f7f6f2;
        font-family: ui-sans-serif, system-ui, sans-serif; color: #2b2b2b;
      }
      main { width: min(760px, 94vw); padding: 1.2rem 0 3rem; text-align: center; }
      h1 { font-size: 1.15rem; font-weight: 600; margin: .2rem 0 .1rem; }
      .sub { color: #8a8473; font-size: .8rem; margin: 0 0 .9rem; }
      #stage { background: #fffdf8; border: 1px solid #e2ddd0; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); max-width: 100%; }
      #q { margin: .9rem 0 .5rem; font-size: 1rem; }
      #q b { color: #b4451f; }
      #choices { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; max-width: 520px; margin: 0 auto; }
      .choice {
        padding: .6rem .7rem; border: 1px solid #d8d2c4; border-radius: 7px; background: #fffdf8;
        color: #2b2b2b; font: 14px ui-sans-serif, system-ui; cursor: pointer; transition: background .1s;
      }
      .choice:hover:not([disabled]) { background: #f0ece1; }
      .choice[disabled] { cursor: default; }
      .choice.correct { background: #d8efd8; border-color: #7bbf7b; }
      .choice.wrong { background: #f3d9d3; border-color: #d79a8b; }
      #bar { display: flex; align-items: center; justify-content: center; gap: 1.2rem; margin-top: .8rem; min-height: 2rem; }
      #feedback { font-size: .9rem; min-height: 1.2rem; }
      #feedback.right { color: #2e7d32; } #feedback.no { color: #b4451f; }
      #score { color: #6a6a6a; font-size: .85rem; }
      #next { padding: .5rem .9rem; border: 1px solid #d8d2c4; border-radius: 7px; background: #fffdf8; color: #2b2b2b; font: 14px ui-sans-serif, system-ui; cursor: pointer; visibility: hidden; }
      a.home { color: #8a8473; font-size: .8rem; text-decoration: none; }
      .tier { padding: .25rem .6rem; border: 1px solid #d8d2c4; background: #fffdf8; color: #6a6a6a; font: .82rem ui-sans-serif, system-ui; cursor: pointer; }
      .tier:first-child { border-radius: 6px 0 0 6px; } .tier:last-child { border-radius: 0 6px 6px 0; } .tier:not(:first-child) { border-left: 0; }
      .tier.on { background: #efe7d8; color: #2b2b2b; font-weight: 600; }
    </style>
  </head>
  <body>
    <main>
      <h1>Name that part</h1>
      <p class="sub">A part of the diagram is highlighted. What is it? &nbsp;·&nbsp; <a class="home" href="play.html">← all games</a></p>
      <div id="opts" style="display:flex;gap:1rem;align-items:center;justify-content:center;margin-bottom:.6rem;font-size:.82rem;color:#6a6a6a">
        <span id="diff" role="group">
          <button class="tier" data-tier="easy">easy</button><button class="tier on" data-tier="normal">normal</button><button class="tier" data-tier="hard">hard</button>
        </span>
        <label style="cursor:pointer"><input type="checkbox" id="showsent" /> show sentence</label>
      </div>
      <p id="sentence" style="min-height:1.1rem;margin:.1rem 0 .3rem;color:#8a8473;font:14px ui-serif,Georgia,serif"></p>
      <canvas id="stage" width="760" height="360"></canvas>
      <p id="q">…</p>
      <div id="choices"></div>
      <div id="bar">
        <span id="feedback"></span>
        <span id="score"></span>
        <button id="next">Next →</button>
      </div>
    </main>
    <script type="module" src="/src/game/main.ts"></script>
  </body>
</html>
