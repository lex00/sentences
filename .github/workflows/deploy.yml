# Build the static site and deploy it to GitHub Pages. The 72 MB model is NOT in git — it's a
# Release asset, downloaded here at build time (server-side, so no CORS) into public/models/ and
# shipped in dist/models/. Pages then serves it same-origin, where the browser needs no CORS.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch model weights from the Release asset (server-side; no CORS)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download models-v1 --repo "${{ github.repository }}" --pattern 'benepar.int8.onnx' --dir public/models --clobber
      - run: npm run build
        env:
          # project Pages site is served under /<repo>/; the model ships same-origin in dist/models/.
          VITE_BASE: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
