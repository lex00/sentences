# Build the static site and deploy it to GitHub Pages. The 72 MB model is NOT built or committed
# here — the app fetches it at runtime from the Release asset named in VITE_MODEL_URL, while the
# small tokenizer/vocab configs ship in dist/models/ from the committed public/models/.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # project Pages site is served under /<repo>/; weights come from the Release asset.
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_MODEL_URL: https://github.com/${{ github.repository }}/releases/download/models-v1/benepar.int8.onnx
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
