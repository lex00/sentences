<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sentences · play</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; min-height: 100%; }
      body { display: grid; place-items: start center; background: #f7f6f2; font-family: ui-sans-serif, system-ui, sans-serif; color: #2b2b2b; }
      main { width: min(640px, 94vw); padding: 1.6rem 0 3rem; }
      h1 { font-size: 1.3rem; font-weight: 600; margin: .2rem 0; text-align: center; }
      .sub { color: #8a8473; font-size: .85rem; margin: 0 0 1.2rem; text-align: center; }
      .level { text-align: center; margin: 0 0 1.3rem; }
      .level b { font-size: 1.1rem; color: #b4451f; }
      a.mode {
        display: block; text-decoration: none; color: inherit; background: #fffdf8; border: 1px solid #e2ddd0;
        border-radius: 10px; padding: .9rem 1.1rem; margin-bottom: .7rem; box-shadow: 0 1px 3px rgba(0,0,0,.06);
      }
      a.mode:hover { border-color: #d0c8b6; }
      .mode .name { font-weight: 600; font-size: 1.02rem; }
      .mode .desc { color: #6a6a6a; font-size: .85rem; margin-top: .15rem; }
      .mode .stat { color: #8a8473; font-size: .78rem; margin-top: .4rem; }
      .foot { text-align: center; margin-top: 1.2rem; font-size: .8rem; }
      .foot a { color: #8a8473; text-decoration: none; }
      #reset { border: 0; background: none; color: #b0a894; font-size: .78rem; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <h1>sentences — play</h1>
      <p class="sub">Three ways to practise grammar with Reed-Kellogg diagrams.</p>
      <p class="level">Level <b id="level">1</b> &nbsp;·&nbsp; <span id="total">0</span> correct so far</p>
      <div id="modes"></div>
      <p class="foot"><a href="./">the diagram tool →</a> &nbsp;·&nbsp; <button id="reset">reset progress</button></p>
    </main>
    <script type="module" src="/src/game/hub.ts"></script>
  </body>
</html>
